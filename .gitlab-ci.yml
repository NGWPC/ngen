# GitLab CI/CD configuration file for ngen repository
variables:
    GIT_SUBMODULE_STRATEGY: recursive

stages:
  - build
  - unit_test
  - sonarqube
  - deploy_test
  - ver_test
  - deploy_oe

build-job:
  stage: build
  script:
    - echo "Building NGEN..."
    - ./scripts/submodule_update.sh
    - sudo chmod 666 /var/run/docker.sock
    - docker rm -f ngen-build-container || true
    - docker run --name ngen-build-container -v .:/ngen-app/ngen -e GITLAB_TOKEN=$GITLAB_TOKEN rockylinux:8 bash -c "
        cd /ngen-app/ngen
        ./scripts/build.sh"
    - sudo chown -R `whoami` .
    - tar -czf ../ngen.tar.gz .
    - echo "Build complete." 

unit-test-job:
  stage: unit_test
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Running unit tests..."
    - docker start ngen-build-container
    - docker exec ngen-build-container bash -c "
        source /opt/ngen-python/bin/activate
        cd /ngen-app/ngen
        for dir in cmake_build cmake_build_no_mpi cmake_build_no_mpi_netcdf cmake_build_no_netcdf cmake_build_no_sqlite
        do
          ./$dir/test/test_unit
          ./$dir/test/test_all
          ./$dir/test/test_bmi_c
          ./$dir/test/test_bmi_fortran
        done"
    - echo "Unit tests complete"
  allow_failure: true

sonarqube-job:
  stage: sonarqube
  variables:
    GIT_STRATEGY: none
  image: 
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script: 
    - echo "Running Sonarqube scan..."
    - ~/sonar-scanner-4.8.0.2856-linux/bin/sonar-scanner
  allow_failure: true

deploy-test-job:
  stage: deploy_test
  variables:
    GIT_STRATEGY: none
  environment: test # NGEN-TEST
  before_script:
    - chmod 400 $SSH_KEY
    - ssh-agent
  script:
    - echo "Deploying NGEN to TEST..."
    - scp ../ngen.tar.gz christina.osumi@10.105.133.13:~/ngen-app
    - ssh -o StrictHostKeyChecking=no -i $SSH_KEY christina.osumi@10.105.133.13 "
        cd ~/ngen-app &&
        rm -rf ngen &&
        mkdir -p ngen &&
        tar -xzf ngen.tar.gz -C ngen &&
        rm ngen.tar.gz"
    - echo "NGEN deployed to TEST"
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development" && $CI_MERGE_REQUEST_STATE == "merged"'

ver-test-job:
  stage: ver_test
  variables:
    GIT_STRATEGY: none
  before_script:
    - chmod 400 $SSH_KEY
    - ssh-agent
  script:
    - echo "Running verification tests..."
    - ssh -o StrictHostKeyChecking=no -i $SSH_KEY christina.osumi@10.105.133.13 "
        cd ~/ngen-app" # TODO add verification test example to common test repo
    - echo "Verification tests complete"
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development" && $CI_MERGE_REQUEST_STATE == "merged"'

deploy-oe-job:
  stage: deploy_oe
  variables:
    GIT_STRATEGY: none
  environment: oe # NGEN-HYDRO-OE
  before_script:
    - chmod 400 $SSH_KEY
    - ssh-agent
  script:
    - echo "Deploying NGEN to OE..."
    - scp ../ngen.tar.gz christina.osumi@10.203.104.196:~/ngen-app
    - ssh -o StrictHostKeyChecking=no -i $SSH_KEY christina.osumi@10.203.104.196 "
        cd ~/ngen-app &&
        rm -rf ngen &&
        mkdir -p ngen &&
        tar -xzf ngen.tar.gz -C ngen &&
        rm ngen.tar.gz"
    - echo "NGEN deployed to OE"
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development" && $CI_MERGE_REQUEST_STATE == "merged"'