# GitLab CI/CD configuration file for ngen repository
variables:
    GIT_SUBMODULE_STRATEGY: recursive

stages:
  - build
  - unit_test
  - sonarqube
  - deploy
  - ver_test

build-job:
  stage: build
  script:
    - echo "Building NGEN..."
    - ./scripts/submodule_update.sh
    - sudo chmod 666 /var/run/docker.sock
    - docker run --rm -v .:/ngen-app/ngen rockylinux:8 bash -c "cd /ngen-app/ngen &&
        ./scripts/build.sh"
    - tar -czf ../ngen.tar.gz .
    - echo "Build complete." 

unit-test-job:
  stage: unit_test
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Running unit tests..."
    - docker run --rm -v .:/ngen-app/ngen rockylinux:8 bash -c "cd /ngen-app/ngen &&
        source /ngen-app/ngen-python/bin/activate &&
        ./cmake_build/test/test_unit &&
        ./cmake_build/test/test_all &&
        ./cmake_build/test/test_bmi_c &&
        ./cmake_build/test/test_bmi_fortran"
    - echo "Unit tests complete"

sonarqube-job:
  stage: sonarqube
  variables:
    GIT_STRATEGY: none
  image: 
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script: 
    - echo "Running Sonarqube scan..."
    - ~/sonar-scanner-4.8.0.2856-linux/bin/sonar-scanner
  allow_failure: true

deploy-job:
  stage: deploy
  variables:
    GIT_STRATEGY: none
  environment: test # NGEN-TEST-COPY
  before_script:
    - chmod 400 $SSH_KEY
    - ssh-agent
  script:
    - echo "Deploying NGEN..."
    - scp ../ngen.tar.gz christina.osumi@10.105.133.122:~/ngen-app
    - ssh -o StrictHostKeyChecking=no -i $SSH_KEY christina.osumi@10.105.133.122 "
        cd ~/ngen-app &&
        rm -rf ngen &&
        tar -xzf ngen.tar.gz &&
        rm ngen.tar.gz"
    - echo "NGEN deployed to NGEN-Test"
#  rules:
#    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development" && $CI_MERGE_REQUEST_STATE == "merged"'

ver-test-job:
  stage: ver_test
  variables:
    GIT_STRATEGY: none
  before_script:
    - chmod 400 $SSH_KEY
    - ssh-agent
  script:
    - echo "Running verification tests..."
    - ssh -o StrictHostKeyChecking=no -i $SSH_KEY christina.osumi@10.105.133.122 "
        cd ~/ngen-app" # TODO add verification test example to common test repo
    - echo "Verification tests complete"
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development" && $CI_MERGE_REQUEST_STATE == "merged"'